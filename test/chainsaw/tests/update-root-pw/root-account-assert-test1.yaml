apiVersion: mariadb.openstack.org/v1beta1
kind: MariaDBAccount
metadata:
  name: openstack-mariadb-root
spec:
  userName: root
  secret: special-char-test1-secret
  accountType: System
status:
  # Verify that the account is REJECTED due to invalid password characters
  conditions:
  - message: 'Input data error occurred password contains invalid character: ''''''
      at position 4 - passwords can only contain letters, numbers, and these special
      characters: @#%^*-_=+:,.!~'
    reason: SecretError
    severity: Warning
    status: "False"
    type: Ready
  - message: 'Input data error occurred password contains invalid character: ''''''
      at position 4 - passwords can only contain letters, numbers, and these special
      characters: @#%^*-_=+:,.!~'
    reason: SecretError
    severity: Warning
    status: "False"
    type: MariaDBAccountReady
  - message: MariaDB / Galera server ready
    reason: Ready
    status: "True"
    type: MariaDBServerReady
